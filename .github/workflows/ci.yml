name: Kotlin CI

# CI будет запускаться при пушах и пулл-реквестах в ветки master и main
on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest # Виртуальная машина на Linux

    steps:
      # 1. Скачиваем твой код из репозитория
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Устанавливаем JDK 17 (как у тебя локально)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin' # Стандартный надежный дистрибутив Java

      # 3. Настраиваем кэширование Gradle для ускорения работы CI
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 4. Даем права на запуск скрипта Gradle (важно для Linux)
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. Запускаем сборку и прогон всех тестов!
      - name: Build and run tests
        run: ./gradlew build